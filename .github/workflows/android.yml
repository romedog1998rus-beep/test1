name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Gradle
        run: |
          sudo apt update
          sudo apt install gradle -y

      - name: Build APK
        run: |
          gradle assemble

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: "**/*.apk"
