<!doctype html><html><head><meta name="viewport" content="width=device-width, initial-scale=1"/><style>
html,body,#map{height:100%;margin:0;background:#090505;color:#f2b06a;font-family:monospace}#map{display:flex;align-items:center;justify-content:center;text-align:center;background:radial-gradient(circle,#30100b,#090505 65%)}.sigil{border:2px solid #8a160c;padding:18px;box-shadow:0 0 20px #8a160c}.dot{display:inline-block;width:10px;height:10px;background:#ff321d;border-radius:50%;box-shadow:0 0 12px #ff321d}</style></head><body><div id="map"><div class="sigil"><div class="dot"></div><h2>FORGE SIGNAL GRID</h2><p>Карта активируется при получении GPS-точек.</p><p id="data">Нет данных.</p></div></div><script>function addPoint(lat,lon,dbm){document.getElementById('data').innerHTML='LAT '+lat.toFixed(5)+'<br>LON '+lon.toFixed(5)+'<br>SIGNAL '+dbm+' dBm';}</script></body></html>
